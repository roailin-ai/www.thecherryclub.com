<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cherry Club</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- BOTONES FLOTANTES -->
<button class="btn-menu" onclick="toggleMenu()">☰</button>
<button class="btn-carrito" onclick="toggleCarrito()">🛒</button>

<!-- ===== HERO / BANNER PRINCIPAL ===== -->

<section class="hero">

  <div class="hero-content">

    <!-- Logo -->
    <img src="logo.png" alt="The Cherry Club Logo" class="hero-logo">

    <!-- Nombre marca -->
    <h1 class="hero-title">The Cherry Club 🍒</h1>

    <!-- Frase -->
    <p class="hero-slogan">Where girly meets cherry</p>

    <!-- Buscador -->
    <div class="hero-search">
      <input type="text" id="searchInput" placeholder="Buscar productos...">
      <button onclick="buscarProducto()">Buscar</button>
    </div>

  </div>

</section>

<!-- ===== MENU LATERAL ===== -->

<div class="menu-lateral" id="menu">

<h2>Nuestros Productos</h2>

<!-- MAQUILLAJE -->
<details>
<summary><strong>💄 Maquillaje</strong></summary>

<details>
<summary>Base</summary>
<div class="productos">

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Base HD</h4>
<p class="precio">$5500</p>
<input type="number" min="1" value="1" id="basehd">
<button class="boton" onclick="agregarAlCarrito('Base HD',5500,'basehd')">
Agregar 🛒
</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Base Matte</h4>
<p class="precio">$5500</p>
<input type="number" min="1" value="1" id="basematte">
<button class="boton" onclick="agregarAlCarrito('Base Matte',5500,'basematte')">
Agregar 🛒
</button>
</div>

</div>
</details>

</details>

</div>

<!-- ===== CARRITO ===== -->

<div class="carrito">
<h3>🛒 Tu carrito</h3>
<ul id="lista-carrito"></ul>
<p>Total: $<span id="total">0</span></p>

<button class="boton whatsapp" onclick="finalizarCompra()">Finalizar por WhatsApp</button>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
